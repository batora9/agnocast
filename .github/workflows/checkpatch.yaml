name: checkpatch

on:
  pull_request:
    paths:
      - 'agnocast_kmod/**'

permissions:
  contents: read

jobs:
  checkpatch:
    runs-on: ubuntu-24.04

    steps:
      - name: Set PR fetch depth
        run: echo "PR_FETCH_DEPTH=$(( ${{ github.event.pull_request.commits }} + 1 ))" >> "${GITHUB_ENV}"

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: ${{ env.PR_FETCH_DEPTH }}

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Download checkpatch.pl
        env:
          # Pinned to a specific Linux kernel commit for reproducibility and supply-chain safety.
          # Bump this SHA periodically to pick up checkpatch updates.
          CHECKPATCH_SHA: fcee7d82f27d6a8b1ddc5bbefda59b4e441e9bc0
        run: |
          BASE="https://raw.githubusercontent.com/torvalds/linux/${CHECKPATCH_SHA}/scripts"
          wget -q "${BASE}/checkpatch.pl"
          wget -q "${BASE}/const_structs.checkpatch"
          wget -q "${BASE}/spelling.txt"
          chmod +x checkpatch.pl

      - name: Run checkpatch on PR diff
        run: |
          IGNORE="LEADING_SPACE,POINTER_LOCATION,SUSPECT_CODE_INDENT,CODE_INDENT"
          IGNORE="$IGNORE,LINE_SPACING,BRACES,OPEN_BRACE,SPLIT_STRING,BLOCK_COMMENT_STYLE"
          IGNORE="$IGNORE,TRAILING_STATEMENTS,LINUX_VERSION_CODE"
          # COMPLEX_MACRO: the KUnit suite's TEST_CASES_* macros are comma-separated
          # KUNIT_CASE(...) lists that cannot be parenthesized; this is a false positive.
          IGNORE="$IGNORE,COMPLEX_MACRO"
          # FILE_PATH_CHANGES: agnocast is an out-of-tree module with no entry in the
          # kernel MAINTAINERS file, so adding or moving kmod files never needs one.
          IGNORE="$IGNORE,FILE_PATH_CHANGES"

          git diff origin/${{ github.base_ref }}...HEAD -- agnocast_kmod/ \
            | ./checkpatch.pl --no-tree --show-types --ignore="$IGNORE" -
